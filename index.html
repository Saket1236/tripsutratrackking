<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TripSutra SOS Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
}

#map{
  height:100%;
  width:100%;
}

.panel{
  position:absolute;
  top:15px;
  left:15px;
  z-index:1000;
  background:#ffffffee;
  padding:14px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  width:320px;
}

.panel h2{
  margin:0 0 10px;
  font-size:18px;
}

.row{
  margin:6px 0;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.active{
  background:#d4edda;
  color:#155724;
}

.inactive{
  background:#f8d7da;
  color:#721c24;
}

small{
  color:#666;
}
</style>
</head>

<body>

<div class="panel">
  <h2>🚨 TripSutra SOS Tracker</h2>

  <div class="row"><b>Session:</b> <span id="sid">Loading...</span></div>
  <div class="row"><b>Status:</b> <span id="status">Waiting...</span></div>
  <div class="row"><b>Started From:</b> <span id="startLoc">--</span></div>
  <div class="row"><b>Current:</b> <span id="currentLoc">--</span></div>
  <div class="row"><b>Latitude:</b> <span id="lat">--</span></div>
  <div class="row"><b>Longitude:</b> <span id="lng">--</span></div>
  <div class="row"><b>Updated:</b> <span id="time">--</span></div>
  <div class="row"><small>Blue line shows travel pattern</small></div>
</div>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ===================================================
   🔥 USE YOUR REAL FIREBASE CONFIG HERE
=================================================== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "tripsutra-3efaa.firebaseapp.com",
  databaseURL: "https://tripsutra-3efaa-default-rtdb.firebaseio.com",
  projectId: "tripsutra-3efaa",
  storageBucket: "tripsutra-3efaa.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===================================================
   GET SESSION ID FROM URL
   Example:
   ?id=SOS_17142353535
=================================================== */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  document.body.innerHTML = "<h2 style='padding:30px'>No Tracking ID Found</h2>";
  throw new Error("No ID");
}

document.getElementById("sid").innerText = id;

/* ===================================================
   MAP
=================================================== */
const map = L.map("map").setView([20.5937, 78.9629], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

let marker = null;
let startMarker = null;
let polyline = L.polyline([], {
  weight:5,
  opacity:0.8
}).addTo(map);

let started = false;

/* ===================================================
   REVERSE GEOCODE
=================================================== */
async function getAddress(lat,lng){
  try{
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.display_name || "Unknown";
  }catch(e){
    return "Unknown";
  }
}

/* ===================================================
   LIVE FIREBASE LISTENER
=================================================== */
onValue(ref(db, "sos/" + id), async(snapshot)=>{

  const data = snapshot.val();

  if(!data){
    return;
  }

  const lat = data.lat;
  const lng = data.lng;
  const active = data.active;
  const time = data.time;

  document.getElementById("lat").innerText = lat;
  document.getElementById("lng").innerText = lng;
  document.getElementById("time").innerText =
      new Date(time).toLocaleString();

  document.getElementById("status").innerHTML =
      active
      ? `<span class="badge active">ACTIVE</span>`
      : `<span class="badge inactive">STOPPED</span>`;

  /* First point = Start location */
  if(!started){

    started = true;

    startMarker = L.marker([lat,lng])
      .addTo(map)
      .bindPopup("🚩 Started Here")
      .openPopup();

    const addr = await getAddress(lat,lng);
    document.getElementById("startLoc").innerText = addr;
  }

  /* Current marker */
  if(!marker){
    marker = L.marker([lat,lng]).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }

  /* Current location name */
  const currentAddr = await getAddress(lat,lng);
  document.getElementById("currentLoc").innerText = currentAddr;

  /* Add movement trail */
  polyline.addLatLng([lat,lng]);

  /* Auto move map */
  map.setView([lat,lng], 16);

});

</script>

</body>
</html>
