<!DOCTYPE html>
<html>
<head>
  <title>TripSutra SOS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔥 Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBpZlomfxpqveFhVV7w3FU-QjaQfLB7dHk",
    authDomain: "tripsutra-3efaa.firebaseapp.com",
    databaseURL: "https://tripsutra-3efaa-default-rtdb.firebaseio.com",
    projectId: "tripsutra-3efaa",
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Get tracking ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get("id");

  if (!id) {
    document.body.innerHTML = "<h2 style='text-align:center;'>No tracking ID provided</h2>";
    throw new Error("No ID");
  }

  // Initialize map
  const map = L.map('map').setView([20, 78], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  let marker;

  // Listen for real-time updates
  onValue(ref(db, "sos/" + id), (snapshot) => {
    const data = snapshot.val();

    if (!data) return;

    const lat = data.lat;
    const lng = data.lng;

    map.setView([lat, lng], 15);

    if (!marker) {
      marker = L.marker([lat, lng]).addTo(map);
    } else {
      marker.setLatLng([lat, lng]);
    }
  });
</script>

</body>
</html>
